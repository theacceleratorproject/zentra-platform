version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: zentra-api
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./data/input:/app/data/input
      - zentra-output:/app/data/output
    environment:
      - ZENTRA_ENV=${ZENTRA_ENV:-production}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost,http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: zentra-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  zentra-output:
    driver: local
