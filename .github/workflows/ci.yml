name: CI — Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Python + COBOL)
    runs-on: ubuntu-latest
    env:
      MASTER_ACCESS_CODE: test-master
      DEMO_ACCESS_CODE: test-demo
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: |
          sudo apt-get update
          sudo apt-get install -y gnucobol

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r src/api/requirements.txt

      - name: Create output directory
        run: mkdir -p data/output

      - name: Run COBOL test suite
        run: bash scripts/run-tests.sh

      - name: Run API tests
        run: pytest src/api/tests/ -v --tb=short

  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
