name: Deploy to AWS

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/zentra.pem
          chmod 600 ~/.ssh/zentra.pem
          ssh -i ~/.ssh/zentra.pem \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
            "cd /home/ubuntu/zentra-platform && git pull origin main && sudo chmod 666 /var/run/docker.sock && export FRONTEND_PORT=3000 && docker compose build frontend && docker compose up -d && sleep 10 && curl -f http://localhost:8000/health && echo Deploy complete"
