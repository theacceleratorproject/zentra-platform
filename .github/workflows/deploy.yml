name: Deploy to AWS
on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Validate secrets
        run: |
          missing=""
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then missing="$missing EC2_SSH_KEY"; fi
          if [ -z "${{ secrets.EC2_HOST }}" ]; then missing="$missing EC2_HOST"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then missing="$missing EC2_USER"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets:$missing"
            echo "Go to repo Settings → Secrets → Actions and add them."
            echo "  EC2_SSH_KEY = contents of your .pem private key file"
            echo "  EC2_HOST    = EC2 public IP or hostname (single line)"
            echo "  EC2_USER    = SSH username (e.g. ubuntu)"
            exit 1
          fi
          echo "All required secrets are configured."

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/zentra.pem
          chmod 600 ~/.ssh/zentra.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script_stop: true
          script: |
            cd /home/ubuntu/zentra-platform
            git pull origin main
            sudo chmod 666 /var/run/docker.sock
            export FRONTEND_PORT=3000
            docker compose build frontend
            docker compose up -d
            sleep 10
            curl -f http://localhost:8000/health && echo "Deploy successful" || exit 1
