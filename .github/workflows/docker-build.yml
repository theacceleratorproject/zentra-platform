name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/api/Dockerfile
          push: false
          load: true
          tags: zentra-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API container
        run: |
          mkdir -p /tmp/zentra-data/input /tmp/zentra-data/output
          docker run -d --name zentra-api-test \
            -p 8000:8000 \
            -v /tmp/zentra-data:/app/data \
            -e MASTER_ACCESS_CODE=test \
            -e DEMO_ACCESS_CODE=test \
            zentra-api:latest
          for i in $(seq 1 12); do
            sleep 5
            curl -sf http://localhost:8000/health && echo " healthy" && break
            echo "Waiting... attempt $i"
          done
          curl -f http://localhost:8000/health || (docker logs zentra-api-test && exit 1)
          docker stop zentra-api-test

  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/frontend/Dockerfile
          push: false
          tags: zentra-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
